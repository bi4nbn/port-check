<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PortPulse · 端口连通检测</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #0a0a0f;
            --surface: rgba(255, 255, 255, 0.03);
            --surface-hover: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.15);
            --text: #fafafa;
            --text-dim: #a1a1aa;
            --text-mute: #52525b;
            --accent: #a78bfa;
            --accent-2: #22d3ee;
            --success: #34d399;
            --danger: #fb7185;
            --warning: #fbbf24;
            --mono: 'JetBrains Mono', ui-monospace, monospace;
            --sans: 'Space Grotesk', system-ui, sans-serif;
        }

        html,
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: 100%;
        }

        /* ===== 动态背景 ===== */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #7c3aed 0%, transparent 70%);
            top: -10%;
            left: -10%;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #06b6d4 0%, transparent 70%);
            top: 40%;
            right: -10%;
            animation-delay: -7s;
        }

        .orb-3 {
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, #ec4899 0%, transparent 70%);
            bottom: -15%;
            left: 30%;
            animation-delay: -14s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(60px, -40px) scale(1.1);
            }

            66% {
                transform: translate(-40px, 50px) scale(0.95);
            }
        }

        .noise {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.035;
            mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .grid-bg {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
        }

        .cursor-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(167, 139, 250, 0.12) 0%, transparent 60%);
            pointer-events: none;
            z-index: 2;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s;
            opacity: 0;
        }

        /* ===== 主容器 ===== */
        .app {
            position: relative;
            z-index: 3;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px 60px;
        }

        /* ===== 导航 ===== */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 48px;
            padding: 16px 20px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 15px;
        }

        .brand-dot {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: conic-gradient(from 0deg, #a78bfa, #22d3ee, #ec4899, #a78bfa);
            position: relative;
            animation: spin-slow 6s linear infinite;
        }

        .brand-dot::after {
            content: '';
            position: absolute;
            inset: 3px;
            background: var(--bg);
            border-radius: 5px;
        }

        @keyframes spin-slow {
            to {
                transform: rotate(360deg);
            }
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-dim);
        }

        .live-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 12px var(--success);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(1.3);
            }
        }

        /* 统计栏 */
        .stats-bar {
            display: flex;
            gap: 14px;
            font-family: var(--mono);
            font-size: 12px;
        }

        .stat-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-dim);
            transition: all 0.3s;
        }

        .stat-chip .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .stat-chip.total .dot {
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent);
        }

        .stat-chip.pass .dot {
            background: var(--success);
            box-shadow: 0 0 6px var(--success);
        }

        .stat-chip.fail-chip .dot {
            background: var(--danger);
            box-shadow: 0 0 6px var(--danger);
        }

        .stat-chip b {
            color: var(--text);
            font-weight: 600;
            min-width: 8px;
            text-align: center;
        }

        /* ===== Hero ===== */
        .hero {
            text-align: center;
            margin-bottom: 40px;
            padding: 0 20px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 20px;
            letter-spacing: 0.05em;
        }

        .eyebrow-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        .hero h1 {
            font-size: clamp(36px, 6vw, 64px);
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1;
            margin-bottom: 16px;
            background: linear-gradient(180deg, #fff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero h1 .accent-text {
            background: linear-gradient(135deg, #a78bfa 0%, #22d3ee 50%, #ec4899 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% 200%;
            animation: gradient-shift 5s ease infinite;
        }

        @keyframes gradient-shift {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        .hero p {
            font-size: 16px;
            color: var(--text-dim);
            max-width: 540px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* ===== 端口卡片网格 ===== */
        .port-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 16px;
        }

        /* ===== 控制中心卡片（顶部） ===== */
        .control-card {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.08) 0%, rgba(34, 211, 238, 0.05) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(167, 139, 250, 0.2);
            border-radius: 20px;
            padding: 28px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 32px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .control-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .control-card:hover::before {
            transform: translateX(100%);
        }

        .control-card:hover {
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.12) 0%, rgba(34, 211, 238, 0.08) 100%);
            border-color: rgba(167, 139, 250, 0.4);
            transform: translateY(-2px);
        }

        .control-left {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 1;
            min-width: 0;
        }

        .control-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(167, 139, 250, 0.3);
            flex-shrink: 0;
            position: relative;
        }

        .control-icon::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            opacity: 0.2;
            filter: blur(8px);
            z-index: -1;
        }

        .control-icon svg {
            width: 26px;
            height: 26px;
            stroke: #0a0a0f;
            fill: none;
            stroke-width: 2.5;
        }

        .control-info {
            flex: 1;
            min-width: 0;
        }

        .control-label {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-mute);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-label .live-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        .control-host {
            font-family: var(--mono);
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .control-desc {
            font-size: 13px;
            color: var(--text-dim);
        }

        .control-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
            flex-shrink: 0;
        }

        .control-cta {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 24px;
            background: var(--text);
            color: var(--bg);
            border-radius: 12px;
            font-family: var(--mono);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .control-card:hover .control-cta {
            transform: translateX(4px);
            box-shadow: 0 8px 24px rgba(255, 255, 255, 0.15);
        }

        .control-cta svg {
            width: 16px;
            height: 16px;
        }

        .control-progress {
            width: 200px;
            height: 3px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .control-card.running .control-progress {
            opacity: 1;
        }

        .control-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            box-shadow: 0 0 10px var(--accent);
            width: 0%;
            transition: width 0.4s ease;
        }

        .control-card.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        /* ===== 端口卡片 ===== */
        .port-card {
            position: relative;
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --card-accent: var(--accent);
            --card-glow: rgba(167, 139, 250, 0.3);
        }

        .port-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(135deg, transparent 30%, var(--card-accent) 50%, transparent 70%);
            background-size: 300% 300%;
            background-position: 0% 0%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .port-card::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, var(--card-glow) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .port-card:hover {
            background: var(--surface-hover);
            border-color: var(--border-strong);
            transform: translateY(-3px);
        }

        .port-card:hover::before {
            opacity: 1;
            animation: border-flow 3s linear infinite;
        }

        .port-card:hover::after {
            opacity: 1;
        }

        @keyframes border-flow {
            to {
                background-position: 300% 0;
            }
        }

        /* 状态主题 */
        .port-card[data-state="running"] {
            --card-accent: var(--warning);
            --card-glow: rgba(251, 191, 36, 0.2);
            border-color: rgba(251, 191, 36, 0.3);
        }

        .port-card[data-state="running"]::before {
            opacity: 1;
            animation: border-flow 2s linear infinite;
        }

        .port-card[data-state="running"]::after {
            opacity: 1;
        }

        .port-card[data-state="success"] {
            --card-accent: var(--success);
            --card-glow: rgba(52, 211, 153, 0.25);
            border-color: rgba(52, 211, 153, 0.35);
            background: rgba(52, 211, 153, 0.04);
        }

        .port-card[data-state="success"]::before {
            opacity: 1;
        }

        .port-card[data-state="success"]::after {
            opacity: 1;
        }

        .port-card[data-state="fail"] {
            --card-accent: var(--danger);
            --card-glow: rgba(251, 113, 133, 0.2);
            border-color: rgba(251, 113, 133, 0.3);
            background: rgba(251, 113, 133, 0.03);
        }

        .port-card[data-state="fail"]::before {
            opacity: 1;
        }

        .port-card[data-state="fail"]::after {
            opacity: 1;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }

        .port-number {
            font-family: var(--mono);
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1;
            background: linear-gradient(180deg, #fff 0%, #71717a 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: all 0.4s;
        }

        .port-card[data-state="success"] .port-number {
            background: linear-gradient(180deg, #34d399 0%, #059669 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .port-card[data-state="fail"] .port-number {
            background: linear-gradient(180deg, #fb7185 0%, #e11d48 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .port-card[data-state="running"] .port-number {
            background: linear-gradient(180deg, #fbbf24 0%, #f59e0b 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 8px;
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.05em;
            background: rgba(167, 139, 250, 0.1);
            color: var(--accent);
            border: 1px solid rgba(167, 139, 250, 0.2);
            transition: all 0.3s;
            white-space: nowrap;
        }

        .port-card[data-state="running"] .status-badge {
            background: rgba(251, 191, 36, 0.1);
            color: var(--warning);
            border-color: rgba(251, 191, 36, 0.2);
        }

        .port-card[data-state="success"] .status-badge {
            background: rgba(52, 211, 153, 0.1);
            color: var(--success);
            border-color: rgba(52, 211, 153, 0.2);
        }

        .port-card[data-state="fail"] .status-badge {
            background: rgba(251, 113, 133, 0.1);
            color: var(--danger);
            border-color: rgba(251, 113, 133, 0.2);
        }

        .badge-spinner {
            width: 10px;
            height: 10px;
            border: 1.5px solid rgba(251, 191, 36, 0.3);
            border-top-color: var(--warning);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        .port-card[data-state="running"] .badge-spinner {
            display: block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .card-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            z-index: 1;
        }

        .port-desc {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .result-area {
            min-height: 48px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .result-msg {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-mute);
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 0;
            transform: translateY(4px);
            transition: all 0.3s;
        }

        .port-card[data-state] .result-msg {
            opacity: 1;
            transform: translateY(0);
        }

        .port-card[data-state="running"] .result-msg {
            color: var(--warning);
        }

        .port-card[data-state="success"] .result-msg {
            color: var(--success);
        }

        .port-card[data-state="fail"] .result-msg {
            color: var(--danger);
        }

        .result-msg .inline-spinner {
            width: 12px;
            height: 12px;
            border: 1.5px solid rgba(251, 191, 36, 0.3);
            border-top-color: var(--warning);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }

        .result-msg svg {
            width: 14px;
            height: 14px;
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        .port-card[data-state="success"] .result-msg svg {
            stroke: var(--success);
        }

        .port-card[data-state="fail"] .result-msg svg {
            stroke: var(--danger);
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            position: relative;
            z-index: 1;
        }

        .elapsed {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-mute);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .port-card[data-state="success"] .elapsed,
        .port-card[data-state="fail"] .elapsed {
            opacity: 1;
        }

        .card-action {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-mute);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.3s;
        }

        .card-action svg {
            width: 12px;
            height: 12px;
            transition: transform 0.3s;
        }

        .port-card:hover .card-action {
            color: var(--card-accent);
        }

        .port-card:hover .card-action svg {
            transform: translateX(3px);
        }

        .port-card[data-state="running"] .card-action {
            opacity: 0;
            pointer-events: none;
        }

        .port-card[data-state="success"] {
            animation: success-pulse 0.6s ease-out;
        }

        @keyframes success-pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.4);
            }

            100% {
                box-shadow: 0 0 0 20px rgba(52, 211, 153, 0);
            }
        }

        .port-card[data-state="fail"] {
            animation: fail-shake 0.5s ease-out;
        }

        @keyframes fail-shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-6px);
            }

            40% {
                transform: translateX(6px);
            }

            60% {
                transform: translateX(-4px);
            }

            80% {
                transform: translateX(4px);
            }
        }

        /* ===== 页脚 ===== */
        .footer {
            margin-top: 32px;
            text-align: center;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-mute);
            letter-spacing: 0.05em;
        }

        /* ===== 移动端 ===== */
        @media (max-width: 768px) {
            .app {
                padding: 16px 14px 40px;
            }

            .nav {
                padding: 12px 14px;
                margin-bottom: 28px;
                border-radius: 14px;
                flex-wrap: wrap;
                gap: 10px;
            }

            .brand {
                font-size: 14px;
            }

            .brand>span {
                display: none;
            }

            .nav-right {
                width: 100%;
                justify-content: space-between;
            }

            .stats-bar {
                gap: 6px;
            }

            .stat-chip {
                padding: 3px 8px;
                font-size: 10px;
            }

            .hero {
                margin-bottom: 24px;
                padding: 0;
            }

            .eyebrow {
                font-size: 10px;
                padding: 5px 12px;
                margin-bottom: 16px;
            }

            .hero h1 {
                font-size: 32px;
                margin-bottom: 12px;
            }

            .hero p {
                font-size: 13px;
            }

            .port-grid {
                grid-template-columns: 1fr;
                gap: 12px;
                margin-bottom: 12px;
            }

            .control-card {
                flex-direction: column;
                align-items: stretch;
                padding: 20px;
                gap: 20px;
            }

            .control-left {
                gap: 16px;
            }

            .control-icon {
                width: 48px;
                height: 48px;
            }

            .control-icon svg {
                width: 22px;
                height: 22px;
            }

            .control-host {
                font-size: 18px;
            }

            .control-desc {
                font-size: 12px;
            }

            .control-right {
                width: 100%;
                align-items: stretch;
            }

            .control-cta {
                width: 100%;
                justify-content: center;
                padding: 14px 20px;
                font-size: 13px;
            }

            .control-progress {
                width: 100%;
            }

            .port-card {
                min-height: auto;
                padding: 18px;
            }

            .card-header {
                margin-bottom: 12px;
            }

            .port-number {
                font-size: 36px;
            }

            .status-badge {
                font-size: 9px;
                padding: 3px 8px;
            }

            .port-desc {
                font-size: 12px;
                margin-bottom: 12px;
            }

            .result-msg {
                font-size: 11px;
            }

            .card-footer {
                margin-top: 10px;
                padding-top: 10px;
            }

            .footer {
                font-size: 10px;
                margin-top: 24px;
            }

            .port-card:active,
            .control-card:active {
                transform: scale(0.98);
            }
        }

        @media (max-width: 380px) {
            .hero h1 {
                font-size: 28px;
            }

            .port-number {
                font-size: 32px;
            }

            .control-host {
                font-size: 16px;
            }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .hero {
                margin-bottom: 16px;
            }

            .hero h1 {
                font-size: 24px;
            }

            .port-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>

<body>
    <div class="bg-layer">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="noise"></div>
    <div class="grid-bg"></div>
    <div class="cursor-glow" id="cursorGlow"></div>

    <div class="app">
        <!-- 导航 -->
        <nav class="nav">
            <div class="brand">
                <div class="brand-dot"></div>
                <span>PortPulse</span>
            </div>
            <div class="nav-right">
                <div class="stats-bar">
                    <div class="stat-chip total"><span class="dot"></span>总计 <b id="totalCount">0</b></div>
                    <div class="stat-chip pass"><span class="dot"></span>通过 <b id="passCount">0</b></div>
                    <div class="stat-chip fail-chip"><span class="dot"></span>失败 <b id="failCount">0</b></div>
                </div>
                <div class="nav-status">
                    <span class="live-dot"></span>
                    <span>在线</span>
                </div>
            </div>
        </nav>

        <!-- Hero -->
        <section class="hero">
            <div class="eyebrow">
                <span class="eyebrow-dot"></span>
                <span>TCP 连通性检测工具</span>
            </div>
            <h1>端口连通<br><span class="accent-text">实时探测</span></h1>
            <p>基于浏览器原生 Fetch API 建立 TCP 握手，毫秒级验证目标端口可达性</p>
        </section>

        <!-- 端口卡片网格 -->
        <section class="port-grid">
            <!-- 控制中心（顶部） -->
            <div class="control-card" onclick="batchAllTest()" id="controlCard">
                <div class="control-left">
                    <div class="control-icon">
                        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                            <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
                            <line x1="12" y1="22.08" x2="12" y2="12" />
                        </svg>
                    </div>
                    <div class="control-info">
                        <div class="control-label">
                            <span class="live-indicator"></span>
                            <span>目标主机</span>
                        </div>
                        <div class="control-host" id="hostText">—</div>
                        <div class="control-desc">批量检测所有端口 · 预计耗时 3-10 秒</div>
                    </div>
                </div>
                <div class="control-right">
                    <div class="control-cta">
                        <span>一键全部执行</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                            stroke-linecap="round">
                            <path d="M5 12h14M13 5l7 7-7 7" />
                        </svg>
                    </div>
                    <div class="control-progress">
                        <div class="control-progress-bar" id="controlProgressBar"></div>
                    </div>
                </div>
            </div>

            <!-- 80 -->
            <div class="port-card" data-port="80" data-state="" onclick="singleTest(80)">
                <div class="card-header">
                    <div class="port-number">80</div>
                    <div class="status-badge">
                        <span class="badge-spinner"></span>
                        <span class="badge-text">待检测</span>
                    </div>
                </div>
                <div class="card-body">
                    <div class="port-desc">HTTP · 超文本传输协议</div>
                    <div class="result-area">
                        <div class="result-msg">
                            <span class="result-icon"></span>
                            <span class="result-text">点击卡片开始检测</span>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <span class="elapsed"></span>
                    <span class="card-action">
                        <span>开始检测</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round">
                            <path d="M5 12h14M13 5l7 7-7 7" />
                        </svg>
                    </span>
                </div>
            </div>

            <!-- 443 -->
            <div class="port-card" data-port="443" data-state="" onclick="singleTest(443)">
                <div class="card-header">
                    <div class="port-number">443</div>
                    <div class="status-badge">
                        <span class="badge-spinner"></span>
                        <span class="badge-text">待检测</span>
                    </div>
                </div>
                <div class="card-body">
                    <div class="port-desc">HTTPS · TLS 加密通道</div>
                    <div class="result-area">
                        <div class="result-msg">
                            <span class="result-icon"></span>
                            <span class="result-text">点击卡片开始检测</span>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <span class="elapsed"></span>
                    <span class="card-action">
                        <span>开始检测</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round">
                            <path d="M5 12h14M13 5l7 7-7 7" />
                        </svg>
                    </span>
                </div>
            </div>

            <!-- 8080 -->
            <div class="port-card" data-port="8080" data-state="" onclick="singleTest(8080)">
                <div class="card-header">
                    <div class="port-number">8080</div>
                    <div class="status-badge">
                        <span class="badge-spinner"></span>
                        <span class="badge-text">待检测</span>
                    </div>
                </div>
                <div class="card-body">
                    <div class="port-desc">ALT-HTTP · 代理或测试服务</div>
                    <div class="result-area">
                        <div class="result-msg">
                            <span class="result-icon"></span>
                            <span class="result-text">点击卡片开始检测</span>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <span class="elapsed"></span>
                    <span class="card-action">
                        <span>开始检测</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round">
                            <path d="M5 12h14M13 5l7 7-7 7" />
                        </svg>
                    </span>
                </div>
            </div>
        </section>

        <div class="footer">
            <p>PORTPULSE © 2026 · 浏览器 TCP 探测 · 结果仅供参考</p>
        </div>
    </div>

    <script>
        const serverHost = location.hostname;
        document.getElementById('hostText').innerText = serverHost || 'localhost';
        const testPortList = [80, 443, 8080];

        let stats = { total: 0, pass: 0, fail: 0 };
        let isRunning = false;
        const runningPorts = new Set();

        // 鼠标光晕（仅桌面端）
        const cursorGlow = document.getElementById('cursorGlow');
        if (window.matchMedia('(pointer: fine)').matches) {
            document.addEventListener('mousemove', (e) => {
                cursorGlow.style.left = e.clientX + 'px';
                cursorGlow.style.top = e.clientY + 'px';
                cursorGlow.style.opacity = '1';
            });
            document.addEventListener('mouseleave', () => {
                cursorGlow.style.opacity = '0';
            });
        } else {
            cursorGlow.style.display = 'none';
        }

        function updateStats() {
            document.getElementById('totalCount').innerText = stats.total;
            document.getElementById('passCount').innerText = stats.pass;
            document.getElementById('failCount').innerText = stats.fail;
        }

        function getCard(port) {
            return document.querySelector(`.port-card[data-port="${port}"]`);
        }

        function setCardState(port, state, msg, elapsed) {
            const card = getCard(port);
            if (!card) return;

            card.setAttribute('data-state', state);

            const badgeText = card.querySelector('.badge-text');
            const resultText = card.querySelector('.result-text');
            const resultIcon = card.querySelector('.result-icon');
            const elapsedEl = card.querySelector('.elapsed');

            const badgeMap = { running: '检测中', success: '已开放', fail: '已关闭' };
            badgeText.innerText = badgeMap[state] || '待检测';

            if (state === 'running') {
                resultIcon.innerHTML = '<span class="inline-spinner"></span>';
                resultText.innerText = msg || '正在建立 TCP 握手...';
                elapsedEl.innerText = '';
            } else if (state === 'success') {
                resultIcon.innerHTML = '<svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>';
                resultText.innerText = msg || '连接已建立';
                elapsedEl.innerText = elapsed ? `耗时 ${elapsed} 毫秒` : '';
            } else if (state === 'fail') {
                resultIcon.innerHTML = '<svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>';
                resultText.innerText = msg || '连接被拒绝';
                elapsedEl.innerText = elapsed ? `耗时 ${elapsed} 毫秒` : '';
            }
        }

        function resetCard(port) {
            const card = getCard(port);
            if (!card) return;
            card.setAttribute('data-state', '');
            card.querySelector('.badge-text').innerText = '待检测';
            card.querySelector('.result-text').innerText = '点击卡片开始检测';
            card.querySelector('.result-icon').innerHTML = '';
            card.querySelector('.elapsed').innerText = '';
        }

        function singleTest(port) {
            if (runningPorts.has(port)) return;
            runningPorts.add(port);
            stats.total++;
            updateStats();

            setCardState(port, 'running', '正在建立 TCP 握手...');

            const abortCtrl = new AbortController();
            const startTime = performance.now();
            const timer = setTimeout(() => {
                abortCtrl.abort();
                stats.fail++;
                updateStats();
                const elapsed = Math.round(performance.now() - startTime);
                setCardState(port, 'fail', '超时 · 可能被防火墙拦截', elapsed);
                runningPorts.delete(port);
            }, 3000);

            fetch(`http://${serverHost}:${port}/`, {
                signal: abortCtrl.signal,
                mode: 'no-cors'
            }).then(() => {
                clearTimeout(timer);
                const elapsed = Math.round(performance.now() - startTime);
                stats.pass++;
                updateStats();
                setCardState(port, 'success', '连接已建立', elapsed);
                runningPorts.delete(port);
            }).catch(err => {
                clearTimeout(timer);
                if (err.name !== 'AbortError') {
                    const elapsed = Math.round(performance.now() - startTime);
                    stats.fail++;
                    updateStats();
                    setCardState(port, 'fail', '连接被拒绝', elapsed);
                }
                runningPorts.delete(port);
            });
        }

        function batchAllTest() {
            if (isRunning) return;
            isRunning = true;

            const controlCard = document.getElementById('controlCard');
            const progressBar = document.getElementById('controlProgressBar');
            controlCard.classList.add('running', 'disabled');
            progressBar.style.width = '0%';

            stats = { total: 0, pass: 0, fail: 0 };
            updateStats();
            testPortList.forEach(p => resetCard(p));

            let index = 0;

            function nextCheck() {
                if (index >= testPortList.length) {
                    controlCard.classList.remove('running', 'disabled');
                    isRunning = false;
                    return;
                }

                const port = testPortList[index];
                stats.total++;
                updateStats();
                setCardState(port, 'running', '正在建立 TCP 握手...');

                const abortCtrl = new AbortController();
                const startTime = performance.now();

                const timer = setTimeout(() => {
                    abortCtrl.abort();
                    stats.fail++;
                    updateStats();
                    const elapsed = Math.round(performance.now() - startTime);
                    setCardState(port, 'fail', '超时 · 被防火墙拦截', elapsed);
                    index++;
                    progressBar.style.width = `${(index / testPortList.length) * 100}%`;
                    setTimeout(nextCheck, 300);
                }, 3000);

                fetch(`http://${serverHost}:${port}/`, {
                    signal: abortCtrl.signal,
                    mode: 'no-cors'
                }).then(() => {
                    clearTimeout(timer);
                    const elapsed = Math.round(performance.now() - startTime);
                    stats.pass++;
                    updateStats();
                    setCardState(port, 'success', '连接已建立', elapsed);
                    index++;
                    progressBar.style.width = `${(index / testPortList.length) * 100}%`;
                    setTimeout(nextCheck, 300);
                }).catch(err => {
                    clearTimeout(timer);
                    if (err.name !== 'AbortError') {
                        const elapsed = Math.round(performance.now() - startTime);
                        stats.fail++;
                        updateStats();
                        setCardState(port, 'fail', '连接被拒绝', elapsed);
                    }
                    index++;
                    progressBar.style.width = `${(index / testPortList.length) * 100}%`;
                    setTimeout(nextCheck, 300);
                });
            }

            nextCheck();
        }
    </script>
</body>

</html>
